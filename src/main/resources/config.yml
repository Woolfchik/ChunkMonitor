# 区块监控插件配置文件
# Chunk Monitor Plugin Configuration File
# Файл конфигурации плагина Chunk Monitor
# 所有时间间隔单位为 Ticks (1秒 = 20 Ticks)
# All time intervals are in Ticks (1 second = 20 Ticks)
# Все временные интервалы указаны в Тиках (1 секунда = 20 тиков)

# 语言设置 / Language Setting / Настройка языка
# 支持: zh_CN (简体中文), en_US (English)
# Supported: zh_CN (Simplified Chinese), en_US (English)
# Поддерживаемые: zh_CN (Упр. Китайский), en_US (Английский), ru_RU (Русский)
language: "en_US"

# MSPT (毫秒每刻) 监控配置 / MSPT Monitoring Configuration / Настройка монитора MSPT (Миллисекунд за тик)
mspt:
  enabled: true
  interval: 100 # 检测间隔，单位 Ticks / Detection interval in Ticks / Интервал обнаружения в тиках
  notification-limit: 65.0 # 通知上限，单位毫秒 / Notification limit in milliseconds / Лимит миллисекунд

# 实体数量监控配置 / Entity Count Monitoring Configuration / Настройка монитора Числа Сущностей
entity:
  enabled: true
  interval: 80 # 检测间隔，单位 Ticks / Detection interval in Ticks / Интервал обнаружения в тиках
  notification-limit: 75 # 区块内实体数量上限 / Entity count limit per chunk / Лимит числа сущностей на чанк

# 掉落物数量监控配置 / Item Drop Monitoring Configuration / Настройка монитора Лежащих предметов
item:
  enabled: true
  interval: 60  # 检测间隔，单位 Ticks / Detection interval in Ticks / Интервал обнаружения в тиках
  notification-limit: 65 # 区块内掉落物数量上限 / Item drop count limit per chunk / Лимит валяющихся предметов на чанк

# 冷却配置 / Cooldown Configuration / Настройка задержки
cooldown:
  duration: 5  # 通知冷却时间，单位分钟 / Notification cooldown in minutes / Задержка оповещений в минутах

# 通知配置 / Notification Configuration / Настройка оповещений
notification:
  broadcast: true # 是否向全服通知 / Send notification to all players / Отправлять оповещения всем игрокам
  console: true # 是否向控制台通知 / Send notification to console / Отправлять оповещения в консоль
  discord: true # 发送通知至 discord / Send notification to discord / Отправлять оповещения в discord
  discord-webhook: "" # Discord webhook 网址 / Discord webhook url / Ссылка на Discord webhook
  discord-max-attempts: 3 # 通知发送尝试次数 / Number of attempts to send a notification / Количество попыток отправки уведомления
  show-coordinates: true  # 是否显示坐标范围 / Show coordinate range / Показывать диапазон координат

# Discord 配置 / Discord configuration / Настройки Discord
discord:
  webhook: "" # Discord webhook 网址 / Discord webhook url / Ссылка на Discord webhook
  max-attempts: 3 # 通知发送尝试次数 / Number of attempts to send a notification / Количество попыток отправки уведомления
  bot:
    username: "Chunk Monitor" # 机器人显示名称 / Username to show as a bot name / Отображаемое имя бота
    avatar-url: "" # 机器人头像 URL / Bot avatar URL / Ссылка на аватар бота
  embed:
    color: "0xF7E525" # 嵌入颜色 / Embed color / Цвет эмбеда
    title: "**WARNING!**" # 消息标题 / Title of the message / Заголовок сообщения

# 消息配置 / Message Configuration / Настройка сообщений
messages:
  zh_CN:
    # 通知数据
    sender: "区块监控"
    world: "世界"
    chunk: "区块"
    coordinates: "坐标范围"
    value: "价值"
    limit: "上限"

    # MSPT 通知消息
    mspt_alert: "MSPT"

    # 实体数量通知消息
    entity_alert: "实体数量"

    # 掉落物通知消息
    item_alert: "掉落物"

    # 启用消息
    enabled_message: "[区块监控] 插件已加载"
    server_type_message: "服务器类型: %type%"
    disabled_message: "[区块监控] 插件已卸载"

    # Discord 消息的字段
    notification:
      type: "类型"
      mspt_alert: "MSPT 警报"
      entity_alert: "实体警报"
      item_alert: "物品警报"

  en_US:
    # Notification data
    sender: "Chunk Monitor"
    world: "World"
    chunk: "Chunk"
    coordinates: "Coordinates"
    value: "Value"
    limit: "Limit"

    # MSPT Alert Message
    mspt_alert: "MSPT"

    # Entity Count Alert Message
    entity_alert: "Entity Count"

    # Item Drop Alert Message
    item_alert: "Item Drops"

    # Enable messages
    enabled_message: "[Chunk Monitor] Plugin enabled"
    server_type_message: "Server Type: %type%"
    disabled_message: "[Chunk Monitor] Plugin disabled"

    # Fields for Discord message
    notification:
      type: "Type"
      mspt_alert: "MSPT Alert"
      entity_alert: "Entity Alert"
      item_alert: "Item Alert"

  ru_RU:
    # Данные для оповещения
    sender: "Chunk Monitor"
    world: "Мир"
    chunk: "Чанк"
    coordinates: "Координаты"
    value: "Значение"
    limit: "Лимит"

    # Оповещающее сообщение MSPT
    mspt_alert: "MSPT"

    # Оповещающее сообщение Количество Сущностей
    entity_alert: "Число сущностей"

    # Оповещающее сообщение Выкинутые Предметы
    item_alert: "Выкинутых предметов"

    # Сообщения включения/выключения
    enabled_message: "[ChunkMonitor] Плагин включен"
    server_type_message: "Тип сервера: %type%"
    disabled_message: "[ChunkMonitor] Плагин выключен"

    # Поля для Discord сообщения
    notification:
      type: "Тип"
      mspt_alert: "Оповещение о MSPT"
      entity_alert: "Оповещение о сущностях"
      item_alert: "Оповещение о предметах"